<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Gaiah</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#E9ECEF;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.btn-main{
background:#212529;
color:white;
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="text-center mb-4">Gaiah</h3>

<form>

<div class="mb-3">

<input type="email" class="form-control" placeholder="Email">

</div>

<div class="mb-3">

<input type="password" class="form-control" placeholder="Password">

</div>

<button class="btn btn-main w-100">

Login

</button>

</form>

</div>

</body>

</html>
