<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaiah | جية</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
background:#F8F9FA;
}

.navbar{
background:#212529;
}

.navbar-brand{
color:white;
font-weight:bold;
font-size:22px;
}

.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(135deg,#E9ECEF,#F8F9FA);
}

.hero h1{
font-size:55px;
font-weight:700;
color:#212529;
}

.hero p{
font-size:20px;
color:#495057;
}

.btn-main{
background:#212529;
color:white;
padding:14px 35px;
border-radius:8px;
font-size:18px;
}

.section-title{
font-size:35px;
font-weight:700;
margin-bottom:40px;
}

.feature{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.footer{
background:#212529;
color:white;
padding:40px;
text-align:center;
margin-top:60px;
}

.lang-switch{
cursor:pointer;
color:white;
margin-left:15px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand">Gaiah | جية</a>

<div>

<span class="lang-switch" onclick="switchLang()">EN</span>

<a href="/login" class="btn btn-light ms-3">Login</a>

</div>

</div>

</nav>


<!-- Hero -->

<section class="hero">

<div class="container">

<h1 id="title">منصة جية</h1>

<p id="desc">
منصة ضيافة وتجارب محلية تجمع بين الترحيب السعودي الأصيل والأسعار الذكية
</p>

<a href="/login" class="btn btn-main mt-4" id="start">
ابدأ الآن
</a>

</div>

</section>


<!-- Features -->

<section class="container text-center mt-5">

<h2 class="section-title" id="features_title">

مميزات المنصة

</h2>

<div class="row g-4">

<div class="col-md-4">

<div class="feature">

<h4 id="f1">الدعوات الذكية</h4>

<p id="f1d">إنشاء وإرسال الدعوات بسهولة</p>

</div>

</div>

<div class="col-md-4">

<div class="feature">

<h4 id="f2">QR Code</h4>

<p id="f2d">تسجيل حضور الضيوف بالباركود</p>

</div>

</div>

<div class="col-md-4">

<div class="feature">

<h4 id="f3">إدارة الضيوف</h4>

<p id="f3d">متابعة الحضور بسهولة</p>

</div>

</div>

</div>

</section>


<!-- Footer -->

<div class="footer">

<p>© 2026 Gaiah Platform</p>

</div>


<script>

let lang="ar"

function switchLang(){

const title=document.getElementById("title")
const desc=document.getElementById("desc")
const start=document.getElementById("start")
const features_title=document.getElementById("features_title")
const f1=document.getElementById("f1")
const f1d=document.getElementById("f1d")
const f2=document.getElementById("f2")
const f2d=document.getElementById("f2d")
const f3=document.getElementById("f3")
const f3d=document.getElementById("f3d")

if(lang=="ar"){

document.documentElement.dir="ltr"

title.innerText="Gaiah Platform"

desc.innerText="A hospitality and local experiences platform combining authentic Saudi welcome with smart pricing"

start.innerText="Start Now"

features_title.innerText="Platform Features"

f1.innerText="Smart Invitations"
f1d.innerText="Create and send invitations easily"

f2.innerText="QR Check-in"
f2d.innerText="Guest check-in using QR code"

f3.innerText="Guest Management"
f3d.innerText="Track attendance easily"

lang="en"

}

else{

location.reload()

}

}

</script>

</body>

</html>
